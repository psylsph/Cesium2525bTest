<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAW Scenario - HMS Queen Elizabeth</title>
  <script type="module" src="/src/main.js"></script>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="app-container">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>AAW Scenario</h2>
        <p class="scenario-title">Taiwan Strait - HMS Queen Elizabeth Under Attack</p>
      </div>
      <div class="sidebar-content">
        <div class="timeline-controls">
          <button id="btnPlay" class="timeline-btn" title="Play">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M4 4l8 4-8 4V4z"/>
            </svg>
          </button>
          <button id="btnPause" class="timeline-btn" title="Pause">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M4 4h3v8H4V4zm5 0h3v8H9V4z"/>
            </svg>
          </button>
          <button id="btnReset" class="timeline-btn" title="Reset">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 3a5 5 0 1 0 0 10A5 5 0 0 0 8 3zm0 1a4 4 0 1 1 0 8 4 4 0 0 1 0-8zM7 6h1v2H7V6zm0 3h1v1H7V9z"/>
            </svg>
          </button>
          <span id="timeDisplay" class="time-display">T+00:00</span>
        </div>
        <div class="legend">
          <div class="legend-item friendly">
            <span class="legend-color"></span> Friendly
          </div>
          <div class="legend-item hostile">
            <span class="legend-color"></span> Hostile
          </div>
          <div class="legend-item unknown">
            <span class="legend-color"></span> Unknown
          </div>
          <div class="legend-item opensky">
            <span class="legend-color"></span> Live Flights
          </div>
        </div>
        <div class="track-list" id="trackList"></div>
      </div>
    </div>
    <div class="map-container">
      <div id="cesiumContainer"></div>
    </div>
  </div>
</body>
</html>
